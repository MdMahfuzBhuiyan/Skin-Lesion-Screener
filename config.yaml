# Skin Lesion Screener — CPU-friendly defaults
data:
  # MedMNIST DermaMNIST: auto-download via pip (~25 MB), derived from HAM10000
  # https://medmnist.com/ — no manual ISIC URLs or per-image HTTP downloads
  source: dermamnist
  raw_dir: data/raw
  processed_dir: data/processed
  medmnist_load_size: 28
  export_size: 128
  subset_size: 1000
  seed: 42

  # DermaMNIST class index (0–6) → binary
  # akiec, bcc, mel → malignant | bkl, df, nv, vasc → benign
  malignant_class_ids: [0, 1, 4]
  benign_class_ids: [2, 3, 5, 6]

training:
  image_size: 128
  batch_size: 32
  epochs: 15
  learning_rate: 0.001
  num_workers: 0
  device: "cpu"
  early_stop_patience: 3

models:
  lightweight: "models/lightweight_cnn.pt"
  baseline: "models/resnet18_baseline.pt"
  default_for_api: "models/lightweight_cnn.pt"

api:
  host: "127.0.0.1"
  port: 8000
